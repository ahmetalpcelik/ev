<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YÖKDİL Kelime Testi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #232733;
  --accent: #6c5ce7; --accent-glow: rgba(108,92,231,0.25);
  --correct: #00b894; --correct-bg: rgba(0,184,148,0.12);
  --wrong: #ff6b6b; --wrong-bg: rgba(255,107,107,0.12);
  --text: #e8e6f0; --text-dim: #8b8aa0; --text-muted: #5a596e;
  --border: rgba(255,255,255,0.06); --gold: #ffd32a;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg); color:var(--text);
}
.bg-grid {
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:linear-gradient(rgba(108,92,231,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,92,231,0.03) 1px,transparent 1px);
  background-size:60px 60px;
}
.bg-orb { position:fixed; width:500px; height:500px; border-radius:50%; filter:blur(120px); opacity:0.12; pointer-events:none; z-index:0; }
.bg-orb-1 { background:#6c5ce7; top:-200px; right:-200px; }
.bg-orb-2 { background:#00b894; bottom:-200px; left:-200px; opacity:0.07; }

.app {
  position:relative; z-index:1; height:100vh; height:100dvh;
  display:flex; flex-direction:column;
}

.screen {
  display:none; flex:1;
  flex-direction:column; justify-content:center; align-items:center;
  padding:20px; overflow-y:auto;
}
.screen.active { display:flex; animation:fadeUp .4s ease; }

@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* ── SCREEN 1: HOME ── */
.home-logo { font-family:'DM Serif Display',serif; font-size:48px; background:linear-gradient(135deg,#6c5ce7,#a29bfe,#6c5ce7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; }
.home-sub { font-size:13px; color:var(--text-dim); letter-spacing:3px; text-transform:uppercase; margin-bottom:32px; }

.list-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; max-width:460px; }
.list-card {
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  padding:20px 16px; cursor:pointer; text-align:center;
  transition:all .25s; display:flex; flex-direction:column; align-items:center; gap:10px;
}
.list-card:hover { border-color:var(--accent); box-shadow:0 0 30px var(--accent-glow); transform:translateY(-2px); }
.list-card .lc-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; }
.list-card .lc-name { font-size:14px; font-weight:700; line-height:1.3; }
.list-card .lc-count { font-size:11px; color:var(--accent); font-weight:600; }

.list-card[data-color="purple"] .lc-icon { background:rgba(108,92,231,0.15); }
.list-card[data-color="green"] .lc-icon { background:rgba(0,184,148,0.15); }
.list-card[data-color="orange"] .lc-icon { background:rgba(255,159,67,0.15); }
.list-card[data-color="pink"] .lc-icon { background:rgba(253,121,168,0.15); }

/* ── SCREEN 2: SETTINGS ── */
.settings-inner { width:100%; max-width:460px; }
.back-row { margin-bottom:16px; }
.back-btn {
  display:inline-flex; align-items:center; gap:6px; background:none;
  border:1px solid var(--border); color:var(--text-dim); padding:8px 16px;
  border-radius:100px; font-family:inherit; font-size:12px; cursor:pointer; transition:all .2s;
}
.back-btn:hover { border-color:var(--accent); color:var(--text); }

.s-title { font-family:'DM Serif Display',serif; font-size:26px; margin-bottom:4px; text-align:center; }
.s-desc { font-size:13px; color:var(--text-dim); margin-bottom:20px; text-align:center; }

.s-label { font-size:11px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }

.mode-row { display:flex; gap:8px; margin-bottom:20px; }
.mode-btn {
  flex:1; background:var(--surface); border:1.5px solid var(--border); border-radius:12px;
  padding:14px 8px; cursor:pointer; text-align:center; transition:all .2s;
  font-family:inherit; color:var(--text);
}
.mode-btn:hover { border-color:var(--accent); }
.mode-btn.active { border-color:var(--accent); background:rgba(108,92,231,0.1); }
.mode-btn .mb-icon { font-size:20px; margin-bottom:4px; }
.mode-btn .mb-text { font-size:12px; font-weight:600; }

.count-row { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
.pill-btn {
  background:var(--surface); border:1px solid var(--border); color:var(--text-dim);
  padding:8px 16px; border-radius:100px; font-size:13px; font-family:inherit;
  cursor:pointer; transition:all .2s;
}
.pill-btn:hover,.pill-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

.slider-wrap { display:none; margin-bottom:12px; animation:fadeUp .25s; }
.slider-wrap.show { display:block; }
.slider-inner { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 20px; }
.slider-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.slider-label { font-size:12px; color:var(--text-dim); }
.slider-value { font-size:20px; font-weight:700; color:var(--accent); font-family:'DM Serif Display',serif; }
.slider-track input[type="range"] {
  -webkit-appearance:none; width:100%; height:6px; border-radius:100px;
  background:var(--surface2); outline:none; cursor:pointer;
}
.slider-track input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
  background:var(--accent); cursor:pointer; box-shadow:0 0 10px var(--accent-glow);
}
.slider-track input[type="range"]::-moz-range-thumb {
  width:22px; height:22px; border-radius:50%; background:var(--accent); border:none; cursor:pointer;
}
.slider-minmax { display:flex; justify-content:space-between; font-size:10px; color:var(--text-muted); margin-top:4px; }

.speed-row {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:14px 18px; display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; transition:all .2s; margin-bottom:10px; user-select:none;
}
.speed-row:hover { border-color:rgba(255,255,255,0.1); }
.speed-row.active { border-color:var(--gold); box-shadow:0 0 16px rgba(255,211,42,0.1); }
.speed-left { display:flex; align-items:center; gap:12px; }
.speed-icon { font-size:18px; }
.speed-text { font-size:13px; font-weight:600; }
.speed-sub { font-size:11px; color:var(--text-dim); }
.toggle-sw {
  width:42px; height:24px; border-radius:100px; background:var(--surface2);
  position:relative; transition:background .25s; flex-shrink:0;
}
.toggle-sw::after {
  content:''; position:absolute; top:3px; left:3px; width:18px; height:18px;
  border-radius:50%; background:var(--text-dim); transition:all .25s;
}
.speed-row.active .toggle-sw { background:var(--gold); }
.speed-row.active .toggle-sw::after { left:21px; background:var(--bg); }

.time-pills { display:none; gap:8px; justify-content:center; margin-bottom:12px; animation:fadeUp .2s; }
.time-pills.show { display:flex; }
.time-pill {
  background:var(--surface); border:1px solid var(--border); color:var(--text-dim);
  padding:6px 14px; border-radius:100px; font-size:12px; font-family:inherit;
  cursor:pointer; transition:all .2s;
}
.time-pill:hover,.time-pill.active { background:var(--gold); border-color:var(--gold); color:var(--bg); font-weight:600; }

.start-btn {
  width:100%; padding:16px; border-radius:14px; border:none;
  background:linear-gradient(135deg,#6c5ce7,#7c6cf0); color:#fff;
  font-family:inherit; font-size:16px; font-weight:600; cursor:pointer;
  transition:all .25s; margin-top:8px;
}
.start-btn:hover { transform:translateY(-1px); box-shadow:0 8px 24px var(--accent-glow); }

/* ── SCREEN 3: QUIZ ── */
.quiz-inner { width:100%; max-width:600px; }
.quiz-badge { text-align:center; font-size:11px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; }
.progress-wrap { background:var(--surface); border-radius:100px; height:5px; margin-bottom:20px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#6c5ce7,#a29bfe); border-radius:100px; transition:width .4s; width:0%; }
.quiz-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.quiz-counter { font-size:13px; color:var(--text-dim); }
.quiz-counter span { color:var(--accent); font-weight:700; }
.quiz-score { font-size:13px; color:var(--text-dim); display:flex; align-items:center; gap:5px; }
.quiz-score .dot { width:7px; height:7px; border-radius:50%; background:var(--correct); }

.q-card {
  background:var(--surface); border:1px solid var(--border); border-radius:18px;
  padding:28px 24px; margin-bottom:16px; position:relative; overflow:hidden;
}
.q-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#6c5ce7,#a29bfe,#00b894); }
.q-label { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--accent); margin-bottom:12px; font-weight:600; }
.q-word { font-family:'DM Serif Display',serif; font-size:32px; margin-bottom:6px; line-height:1.2; }
.q-hint { font-size:13px; color:var(--text-dim); font-style:italic; }

.timer-box { display:none; position:absolute; top:16px; right:16px; width:44px; height:44px; }
.timer-box.show { display:block; }
.timer-box svg { width:44px; height:44px; transform:rotate(-90deg); }
.timer-ring-bg { fill:none; stroke:var(--surface2); stroke-width:4; }
.timer-ring { fill:none; stroke:var(--gold); stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset .3s linear; }
.timer-ring.danger { stroke:var(--wrong); }
.timer-num { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; color:var(--gold); }
.timer-num.danger { color:var(--wrong); }

.opts { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
.opt-btn {
  background:var(--surface); border:1.5px solid var(--border); border-radius:12px;
  padding:14px 18px; color:var(--text); font-family:inherit; font-size:14px;
  cursor:pointer; text-align:left; transition:all .2s; display:flex; align-items:center; gap:12px;
}
.opt-btn .ol { width:30px; height:30px; border-radius:8px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--text-dim); flex-shrink:0; transition:all .2s; }
.opt-btn:hover:not(.dis) { border-color:var(--accent); background:rgba(108,92,231,0.06); }
.opt-btn:hover:not(.dis) .ol { background:var(--accent); color:#fff; }
.opt-btn.ok { border-color:var(--correct); background:var(--correct-bg); }
.opt-btn.ok .ol { background:var(--correct); color:#fff; }
.opt-btn.no { border-color:var(--wrong); background:var(--wrong-bg); }
.opt-btn.no .ol { background:var(--wrong); color:#fff; }
.opt-btn.dis { pointer-events:none; opacity:.5; }
.opt-btn.ok.dis,.opt-btn.no.dis { opacity:1; }
.opt-mean { font-size:11px; margin-left:auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:45%; }
.ok-mean { color:var(--correct); }
.no-mean { color:var(--wrong); }

.fb { display:none; }

.nxt-btn {
  display:block; width:100%; padding:14px; border-radius:12px; border:none;
  background:var(--surface2); color:var(--text-muted);
  font-family:inherit; font-size:15px; font-weight:600;
  cursor:not-allowed; transition:all .25s; pointer-events:none;
}
.nxt-btn.live {
  background:linear-gradient(135deg,#6c5ce7,#7c6cf0); color:#fff;
  cursor:pointer; pointer-events:auto;
}
.nxt-btn.live:hover { transform:translateY(-1px); box-shadow:0 6px 20px var(--accent-glow); }

/* ── SCREEN 4: RESULT ── */
.result-inner { width:100%; max-width:500px; text-align:center; }
.res-circle { width:150px; height:150px; border-radius:50%; margin:0 auto 24px; position:relative; display:flex; align-items:center; justify-content:center; }
.res-circle svg { position:absolute; inset:0; transform:rotate(-90deg); }
.res-circle .rs-txt { font-family:'DM Serif Display',serif; font-size:40px; z-index:1; }
.res-title { font-family:'DM Serif Display',serif; font-size:26px; margin-bottom:6px; }
.res-desc { color:var(--text-dim); font-size:13px; margin-bottom:24px; line-height:1.5; }
.res-stats { display:flex; justify-content:center; gap:24px; margin-bottom:28px; }
.rs-item { text-align:center; }
.rs-num { font-size:24px; font-weight:700; }
.rs-num.green { color:var(--correct); } .rs-num.red { color:var(--wrong); }
.rs-lbl { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

.wrong-sec { text-align:left; background:var(--surface); border-radius:14px; padding:20px; margin-bottom:20px; border:1px solid var(--border); max-height:30vh; overflow-y:auto; }
.wrong-sec h3 { font-size:14px; font-weight:700; margin-bottom:10px; color:var(--wrong); }
.ww-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
.ww-item:last-child { border-bottom:none; }
.ww-item .we { font-weight:600; } .ww-item .wt { color:var(--text-dim); }

.res-btns { display:flex; gap:10px; justify-content:center; }
.rb-primary {
  padding:14px 32px; border-radius:100px; border:none;
  background:linear-gradient(135deg,#6c5ce7,#7c6cf0); color:#fff;
  font-family:inherit; font-size:15px; font-weight:600; cursor:pointer; transition:all .25s;
}
.rb-primary:hover { transform:translateY(-2px); box-shadow:0 6px 24px var(--accent-glow); }
.rb-secondary {
  padding:14px 32px; border-radius:100px; background:var(--surface);
  border:1px solid var(--border); color:var(--text-dim);
  font-family:inherit; font-size:15px; font-weight:600; cursor:pointer; transition:all .25s;
}
.rb-secondary:hover { border-color:var(--accent); color:var(--text); }

/* ── WORDLE ── */
.w-board { margin-bottom:12px; }
.w-row { display:flex; gap:4px; justify-content:center; margin-bottom:4px; }
.w-cell {
  width:36px; height:36px; border:2px solid var(--border); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:700; text-transform:uppercase;
  font-family:'Plus Jakarta Sans',sans-serif; transition:all .3s;
}
.w-cell.space { border:1px dashed var(--text-muted); background:none; width:16px; }
.w-cell.g { background:#00b894; border-color:#00b894; color:#fff; }
.w-cell.y { background:#f9ca24; border-color:#f9ca24; color:#1a1d27; }
.w-cell.x { background:var(--surface2); border-color:var(--surface2); color:var(--text-muted); }
.w-cell.reveal { animation:wPop .3s ease; }
@keyframes wPop { 0%{transform:scale(0.8)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }

.w-input-row { display:flex; gap:8px; margin-bottom:10px; }
.w-input {
  flex:1; background:var(--surface); border:1.5px solid var(--border); border-radius:10px;
  padding:12px 16px; color:var(--text); font-family:inherit; font-size:15px;
  outline:none; transition:border-color .2s; text-transform:lowercase;
}
.w-input:focus { border-color:var(--accent); }
.w-input:disabled { opacity:.4; cursor:not-allowed; }
.w-submit {
  width:48px; background:var(--accent); border:none; border-radius:10px;
  color:#fff; font-size:20px; cursor:pointer; transition:all .2s;
}
.w-submit:hover { background:#7c6cf0; }
.w-submit:disabled { opacity:.4; cursor:not-allowed; }
.w-tries { text-align:center; font-size:12px; color:var(--text-dim); margin-bottom:10px; }
.w-answer { text-align:center; font-size:14px; margin-bottom:10px; padding:10px; border-radius:8px; }
.w-answer.w-win { color:var(--correct); background:var(--correct-bg); }
.w-answer.w-lose { color:var(--wrong); background:var(--wrong-bg); }

/* ── MOBILE ── */
@media(max-width:600px){
  .home-logo { font-size:34px; }
  .home-sub { font-size:11px; margin-bottom:20px; }
  .list-grid { gap:10px; }
  .list-card { padding:16px 12px; gap:8px; border-radius:14px; }
  .list-card .lc-icon { width:38px; height:38px; font-size:18px; }
  .list-card .lc-name { font-size:13px; }
  .s-title { font-size:22px; }
  .mode-btn { padding:12px 6px; }
  .mode-btn .mb-icon { font-size:18px; }
  .mode-btn .mb-text { font-size:11px; }
  .q-word { font-size:24px; }
  .q-card { padding:22px 18px; }
  .opt-btn { padding:12px 14px; font-size:13px; }
  .opt-btn .ol { width:26px; height:26px; font-size:11px; }
  .res-circle { width:120px; height:120px; margin-bottom:16px; }
  .res-circle .rs-txt { font-size:32px; }
  .res-title { font-size:22px; }
  .res-stats { gap:16px; margin-bottom:20px; }
  .rs-num { font-size:20px; }
  .w-cell { width:28px; height:28px; font-size:13px; }
  .w-cell.space { width:12px; }
  .w-input { padding:10px 12px; font-size:14px; }
  .w-submit { width:42px; }
  .w-answer { font-size:13px; padding:8px; }
  .mode-row { gap:6px; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="app">
  <!-- SCREEN 1: HOME -->
  <div class="screen active" id="scrHome">
    <div class="home-logo">YÖKDİL</div>
    <div class="home-sub">Kelime Testi</div>
    <div class="list-grid" id="listGrid"></div>
  </div>

  <!-- SCREEN 2: SETTINGS -->
  <div class="screen" id="scrSettings">
    <div class="settings-inner">
      <div class="back-row"><button class="back-btn" onclick="go('scrHome')">&#8592; Geri</button></div>
      <div class="s-title" id="sTitle"></div>
      <div class="s-desc" id="sDesc"></div>

      <div class="s-label">Mod</div>
      <div class="mode-row" id="modeRow">
        <button class="mode-btn active" data-m="en-to-tr" onclick="pickMode(this)"><div class="mb-icon">&#127468;&#127463;</div><div class="mb-text">İng→Tr</div></button>
        <button class="mode-btn" data-m="tr-to-en" onclick="pickMode(this)"><div class="mb-icon">&#127481;&#127479;</div><div class="mb-text">Tr→İng</div></button>
        <button class="mode-btn" data-m="mixed" onclick="pickMode(this)"><div class="mb-icon">&#128256;</div><div class="mb-text">Karışık</div></button>
        <button class="mode-btn" data-m="wordle" onclick="pickMode(this)"><div class="mb-icon">&#129513;</div><div class="mb-text">Wordle</div></button>
      </div>

      <div class="s-label">Soru Sayısı</div>
      <div class="count-row" id="countRow">
        <button class="pill-btn" onclick="pickCount(10,this)">10</button>
        <button class="pill-btn active" onclick="pickCount(20,this)">20</button>
        <button class="pill-btn" onclick="pickCount(40,this)">40</button>
        <button class="pill-btn" onclick="pickCount(0,this)">Tümü</button>
        <button class="pill-btn" onclick="toggleSlider(this)">Custom</button>
      </div>
      <div class="slider-wrap" id="sliderWrap">
        <div class="slider-inner">
          <div class="slider-header"><span class="slider-label">Soru Sayısı</span><span class="slider-value" id="sliderVal">25</span></div>
          <div class="slider-track"><input type="range" id="sliderInput" min="5" max="100" step="5" value="25" oninput="document.getElementById('sliderVal').textContent=this.value;qCount=+this.value"></div>
          <div class="slider-minmax"><span>5</span><span id="sliderMax">max</span></div>
        </div>
      </div>

      <div class="speed-row" id="speedRow" onclick="toggleSpeed()">
        <div class="speed-left"><span class="speed-icon">&#9889;</span><div><div class="speed-text">Speed Round</div><div class="speed-sub">Geri sayım başlat</div></div></div>
        <div class="toggle-sw"></div>
      </div>
      <div class="time-pills" id="timePills">
        <button class="time-pill" onclick="pickTime(5,this)">5s</button>
        <button class="time-pill" onclick="pickTime(8,this)">8s</button>
        <button class="time-pill active" onclick="pickTime(10,this)">10s</button>
        <button class="time-pill" onclick="pickTime(15,this)">15s</button>
        <button class="time-pill" onclick="pickTime(20,this)">20s</button>
      </div>

      <button class="start-btn" onclick="startQuiz()">Teste Başla &#8594;</button>
    </div>
  </div>

  <!-- SCREEN 3: QUIZ -->
  <div class="screen" id="scrQuiz">
    <div class="quiz-inner">
      <div class="quiz-badge" id="qBadge"></div>
      <div class="progress-wrap"><div class="progress-fill" id="progBar"></div></div>

// ── STATE ──
var listId=null, mode='en-to-tr', qCount=20, speedOn=false, timerSec=10;
var questions=[], curQ=0, score=0, wrongArr=[], answerTimes=[];
var timerInt=null, timerLeft=0;

// ── NAV ──
function go(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  var el=document.getElementById(id); el.classList.add('active');
  el.style.animation='none'; void el.offsetHeight; el.style.animation='fadeUp .4s ease';
}

// ── SCREEN 1: RENDER HOME ──
function renderHome(){
  var g=document.getElementById('listGrid'); g.innerHTML='';
  var entries=Object.entries(WORD_LISTS);
  for(var i=0;i<entries.length;i++){
    var id=entries[i][0], L=entries[i][1];
    var d=document.createElement('div'); d.className='list-card'; d.setAttribute('data-color',L.color||'purple');
    d.innerHTML='<div class="lc-icon">'+L.icon+'</div><div class="lc-name">'+L.title+'</div><div class="lc-count">'+L.words.length+' kelime</div>';
    d.onclick=(function(lid){return function(){selectList(lid)}})(id);
    g.appendChild(d);
  }
}

function selectList(id){
  listId=id; var L=WORD_LISTS[id];
  document.getElementById('sTitle').textContent=L.title;
  document.getElementById('sDesc').textContent=L.words.length+' kelime';
  // reset settings
  mode='en-to-tr'; qCount=20; speedOn=false;
  document.querySelectorAll('#modeRow .mode-btn').forEach(function(b,i){b.classList.toggle('active',i===0)});
  document.querySelectorAll('#countRow .pill-btn').forEach(function(b,i){b.classList.toggle('active',i===1)});
  document.getElementById('sliderWrap').classList.remove('show');
  document.getElementById('speedRow').classList.remove('active');
  document.getElementById('timePills').classList.remove('show');
  timerSec=10;
  document.querySelectorAll('.time-pill').forEach(function(b,i){b.classList.toggle('active',i===2)});
  var mx=Math.floor(L.words.length/5)*5;
  var sl=document.getElementById('sliderInput'); sl.max=mx; sl.value=Math.min(25,mx);
  document.getElementById('sliderVal').textContent=sl.value;
  document.getElementById('sliderMax').textContent=mx;
  go('scrSettings');
}

// ── SCREEN 2: SETTINGS ──
function pickMode(btn){
  document.querySelectorAll('#modeRow .mode-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active'); mode=btn.getAttribute('data-m');
}
function pickCount(n,btn){
  qCount=n;
  document.querySelectorAll('#countRow .pill-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  document.getElementById('sliderWrap').classList.remove('show');
}
function toggleSlider(btn){
  var w=document.getElementById('sliderWrap'), open=w.classList.contains('show');
  if(open){ w.classList.remove('show'); btn.classList.remove('active'); qCount=20;
    document.querySelectorAll('#countRow .pill-btn').forEach(function(b,i){b.classList.toggle('active',i===1)});
  } else {
    document.querySelectorAll('#countRow .pill-btn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active'); w.classList.add('show'); qCount=+document.getElementById('sliderInput').value;
  }
}
function toggleSpeed(){
  speedOn=!speedOn;
  document.getElementById('speedRow').classList.toggle('active',speedOn);
  document.getElementById('timePills').classList.toggle('show',speedOn);
}
function pickTime(s,btn){
  timerSec=s;
  document.querySelectorAll('.time-pill').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
}

// ── QUIZ ENGINE ──
function shuffle(a){var r=a.slice();for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=r[i];r[i]=r[j];r[j]=t}return r}

function genQuestions(){
  var W=WORD_LISTS[listId].words, pool=shuffle(W);
  var cnt=qCount===0?pool.length:Math.min(qCount,pool.length); pool=pool.slice(0,cnt);
  var base=Math.floor(cnt/4), rem=cnt%4, slots=[base,base,base,base], xo=[2,3,1,0];
  for(var r=0;r<rem;r++) slots[xo[r]]++;
  var pos=[]; for(var s=0;s<4;s++) for(var j=0;j<slots[s];j++) pos.push(s);
  pos=shuffle(pos);
  return pool.map(function(w,idx){
    var etr=mode==='mixed'?Math.random()>.5:mode==='en-to-tr';
    var qf=etr?'en':'tr', af=etr?'tr':'en', ca=w[af];
    var dist=shuffle(W.filter(function(x){return x[af]!==ca})).slice(0,3).map(function(x){return x[af]});
    var opts=dist.slice(); opts.splice(pos[idx],0,ca);
    return {word:w[qf],correct:ca,en:w.en,tr:w.tr,options:opts,etr:etr};
  });
}

function startQuiz(){
  if(mode==='wordle') return startWordle();
  questions=genQuestions(); curQ=0; score=0; wrongArr=[]; answerTimes=[]; clearInterval(timerInt);
  document.getElementById('qBadge').textContent=WORD_LISTS[listId].title+(speedOn?' \u26A1':'');
  document.getElementById('qTot').textContent=questions.length;
  document.getElementById('timerBox').classList.toggle('show',speedOn);
  go('scrQuiz'); showQ();
}

function showQ(){
  var q=questions[curQ];
  document.getElementById('qNum').textContent=curQ+1;
  document.getElementById('qScore').textContent=score;
  document.getElementById('progBar').style.width=(curQ/questions.length*100)+'%';
  document.getElementById('qLabel').textContent=q.etr?'\u0130ng \u2192 Tr':'Tr \u2192 \u0130ng';
  document.getElementById('qWord').textContent=q.word;
  document.getElementById('qHint').textContent=q.etr?'T\u00fcrk\u00e7e anlam\u0131n\u0131 se\u00e7in':'\u0130ngilizce kar\u015f\u0131l\u0131\u011f\u0131n\u0131 se\u00e7in';
  var g=document.getElementById('optsGrid'); g.innerHTML='';
  var L=['A','B','C','D'];
  q.options.forEach(function(o,i){
    var b=document.createElement('button'); b.className='opt-btn';
    b.innerHTML='<span class="ol">'+L[i]+'</span><span>'+o+'</span>';
    b.onclick=function(){answer(b,o,q)}; g.appendChild(b);
  });
  document.getElementById('nxtBtn').classList.remove('live');
  document.getElementById('nxtBtn').textContent='Sonraki Soru \u2192';
  if(speedOn) startTimer();
}

function answer(btn,sel,q){
  if(speedOn) stopTimer();
  var all=document.querySelectorAll('.opt-btn');
  for(var i=0;i<all.length;i++) all[i].classList.add('dis');
  var W=WORD_LISTS[listId].words;
  var af=q.etr?'tr':'en', qf=q.etr?'en':'tr';
  function getMeaning(t){for(var j=0;j<W.length;j++)if(W[j][af]===t)return W[j][qf];return '';}
  if(sel===q.correct){
    btn.classList.add('ok'); score++;
    var m=getMeaning(sel); if(m) btn.innerHTML+='<span class="opt-mean ok-mean">\u2192 '+m+'</span>';
  } else {
    btn.classList.add('no');
    var wm=getMeaning(sel); if(wm) btn.innerHTML+='<span class="opt-mean no-mean">\u2192 '+wm+'</span>';
    for(var i=0;i<all.length;i++){
      var txt=all[i].querySelector('span:nth-child(2)').textContent;
      if(txt===q.correct){
        all[i].classList.add('ok');
        var cm=getMeaning(q.correct); if(cm) all[i].innerHTML+='<span class="opt-mean ok-mean">\u2192 '+cm+'</span>';
      }
    }
    wrongArr.push({en:q.en,tr:q.tr});
  }
  document.getElementById('qScore').textContent=score;
  var nb=document.getElementById('nxtBtn');
  nb.textContent=curQ===questions.length-1?'Sonu\u00e7lar\u0131 G\u00f6r':'Sonraki \u2192';
  nb.classList.add('live');
}

function nextQ(){ curQ++; curQ>=questions.length?(clearInterval(timerInt),showResult()):showQ(); }

// ── TIMER ──
function startTimer(){
  clearInterval(timerInt); timerLeft=timerSec;
  var circ=2*Math.PI*18, ring=document.getElementById('timerRing'), num=document.getElementById('timerNum');
  ring.style.transition='none'; ring.style.strokeDashoffset='0';
  ring.classList.remove('danger'); num.classList.remove('danger'); num.textContent=timerSec;
  var t0=Date.now();
  timerInt=setInterval(function(){
    var el=(Date.now()-t0)/1000; timerLeft=Math.max(0,timerSec-el);
    var ds=Math.ceil(timerLeft); num.textContent=ds;
    ring.style.transition='stroke-dashoffset .3s linear';
    ring.style.strokeDashoffset=(el/timerSec*circ).toFixed(2);
    if(ds<=3){ring.classList.add('danger');num.classList.add('danger')}
    if(timerLeft<=0){clearInterval(timerInt);timeUp()}
  },100);
}
function stopTimer(){ clearInterval(timerInt); answerTimes.push(timerSec-timerLeft); }
function timeUp(){
  var all=document.querySelectorAll('.opt-btn'); for(var i=0;i<all.length;i++) all[i].classList.add('dis');
  var q=questions[curQ];
  var W=WORD_LISTS[listId].words;
  var af=q.etr?'tr':'en', qf=q.etr?'en':'tr';
  function getMeaning(t){for(var j=0;j<W.length;j++)if(W[j][af]===t)return W[j][qf];return '';}
  for(var i=0;i<all.length;i++){
    var txt=all[i].querySelector('span:nth-child(2)').textContent;
    if(txt===q.correct){
      all[i].classList.add('ok');
      var cm=getMeaning(q.correct); if(cm) all[i].innerHTML+='<span class="opt-mean ok-mean">\u2192 '+cm+'</span>';
    }
  }
  wrongArr.push({en:q.en,tr:q.tr}); answerTimes.push(timerSec);
  var nb=document.getElementById('nxtBtn');
  nb.textContent=curQ===questions.length-1?'Sonu\u00e7lar\u0131 G\u00f6r':'Sonraki \u2192';
  nb.classList.add('live');
}

// ── WORDLE ENGINE ──
var wWords=[], wCur=0, wScore=0, wWrongArr=[];
var wAnswer='', wTemplate=[], wMaxTries=4, wTry=0, wDone=false;

function startWordle(){
  var W=WORD_LISTS[listId].words;
  wWords=shuffle(W);
  var cnt=qCount===0?wWords.length:Math.min(qCount,wWords.length);
  wWords=wWords.slice(0,cnt);
  wCur=0; wScore=0; wWrongArr=[];
  document.getElementById('wBadge').textContent=WORD_LISTS[listId].title+' \uD83E\uDDE9';
  document.getElementById('wTot').textContent=wWords.length;
  go('scrWordle'); showWordle();
}

function showWordle(){
  var w=wWords[wCur];
  wAnswer=w.en.toLowerCase();
  wTemplate=[]; // each char: letter or ' ' for space
  for(var i=0;i<wAnswer.length;i++) wTemplate.push(wAnswer[i]===' '?'space':'letter');
  wTry=0; wDone=false;

  document.getElementById('wNum').textContent=wCur+1;
  document.getElementById('wScore').textContent=wScore;
  document.getElementById('wProgBar').style.width=(wCur/wWords.length*100)+'%';
  document.getElementById('wClue').textContent=w.tr;
  document.getElementById('wTries').textContent='Kalan hak: '+wMaxTries;

  // build empty board
  var board=document.getElementById('wBoard'); board.innerHTML='';
  for(var r=0;r<wMaxTries;r++){
    var row=document.createElement('div'); row.className='w-row'; row.id='wr'+r;
    for(var c=0;c<wAnswer.length;c++){
      var cell=document.createElement('div'); cell.className='w-cell';
      if(wTemplate[c]==='space'){ cell.classList.add('space'); cell.textContent='\u00B7'; }
      row.appendChild(cell);
    }
    board.appendChild(row);
  }

  // remove old answer display if any
  var oldAns=document.querySelector('.w-answer');
  if(oldAns) oldAns.remove();

  // reset input
  var inp=document.getElementById('wInput'); inp.disabled=false; inp.value=''; inp.focus();
  document.getElementById('wSubmit').disabled=false;
  document.getElementById('wNxt').classList.remove('live');
  document.getElementById('wNxt').textContent='Sonraki Soru \u2192';
}

function wordleGuess(){
  if(wDone) return;
  var inp=document.getElementById('wInput');
  // build guess: user types without spaces, we insert spaces at template positions
  var raw=inp.value.toLowerCase().replace(/[^a-z]/g,'');
  if(raw.length===0) return;

  // count how many letters (non-space) the answer has
  var ansLetters=wAnswer.replace(/ /g,'');
  if(raw.length!==ansLetters.length){
    inp.style.borderColor='var(--wrong)';
    setTimeout(function(){inp.style.borderColor=''},500);
    return;
  }

  // map raw guess into full guess with spaces
  var guess='', ri=0;
  for(var i=0;i<wAnswer.length;i++){
    if(wTemplate[i]==='space') guess+=' ';
    else guess+=raw[ri++];
  }

  // evaluate
  var row=document.getElementById('wr'+wTry);
  var cells=row.querySelectorAll('.w-cell');
  var ansArr=wAnswer.split(''), guessArr=guess.split('');
  var result=[]; // 'g','y','x','space'
  var ansUsed=[], guessUsed=[];
  for(var i=0;i<ansArr.length;i++){ ansUsed.push(false); guessUsed.push(false); }

  // pass 1: greens
  for(var i=0;i<ansArr.length;i++){
    if(wTemplate[i]==='space'){ result.push('space'); continue; }
    if(guessArr[i]===ansArr[i]){ result.push('g'); ansUsed[i]=true; guessUsed[i]=true; }
    else result.push('');
  }
  // pass 2: yellows
  for(var i=0;i<guessArr.length;i++){
    if(result[i]!=='') continue;
    var found=false;
    for(var j=0;j<ansArr.length;j++){
      if(!ansUsed[j]&&ansArr[j]===guessArr[i]&&wTemplate[j]!=='space'){
        result[i]='y'; ansUsed[j]=true; found=true; break;
      }
    }
    if(!found) result[i]='x';
  }

  // render with stagger
  for(var i=0;i<cells.length;i++){
    (function(idx){
      setTimeout(function(){
        if(wTemplate[idx]==='space') return;
        cells[idx].textContent=guessArr[idx].toUpperCase();
        cells[idx].classList.add(result[idx],'reveal');
      }, idx*80);
    })(i);
  }

  wTry++;
  var isWin=(guess===wAnswer);

  setTimeout(function(){
    if(isWin){
      wDone=true; wScore++;
      showWordleResult(true);
    } else if(wTry>=wMaxTries){
      wDone=true;
      wWrongArr.push({en:wWords[wCur].en, tr:wWords[wCur].tr});
      showWordleResult(false);
    } else {
      document.getElementById('wTries').textContent='Kalan hak: '+(wMaxTries-wTry);
      inp.value=''; inp.focus();
    }
  }, wAnswer.length*80+200);

  inp.value='';
}

function showWordleResult(win){
  var inp=document.getElementById('wInput'); inp.disabled=true;
  document.getElementById('wSubmit').disabled=true;

  // show answer text
  var div=document.createElement('div');
  div.className='w-answer '+(win?'w-win':'w-lose');
  div.innerHTML=win?'\u2705 Do\u011fru!':'\u274C Cevap: <strong>'+wWords[wCur].en+'</strong>';
  document.getElementById('wBoard').after(div);

  document.getElementById('wScore').textContent=wScore;
  document.getElementById('wTries').textContent='';
  var nb=document.getElementById('wNxt');
  nb.textContent=wCur===wWords.length-1?'Sonu\u00e7lar\u0131 G\u00f6r':'Sonraki \u2192';
  nb.classList.add('live');
}

function wordleNext(){
  wCur++;
  if(wCur>=wWords.length){
    // transfer to result screen
    score=wScore; wrongArr=wWrongArr; questions=wWords; answerTimes=[];
    speedOn=false;
    showResult();
  } else showWordle();
}

// ── RESULT ──
function showResult(){
  var pct=Math.round(score/questions.length*100);
  document.getElementById('resPct').textContent=pct+'%';
  document.getElementById('resOk').textContent=score;
  document.getElementById('resNo').textContent=questions.length-score;
  document.getElementById('resTot').textContent=questions.length;
  var tw=document.getElementById('resTimeWrap');
  if(speedOn&&answerTimes.length){
    var avg=answerTimes.reduce(function(a,b){return a+b},0)/answerTimes.length;
    document.getElementById('resAvg').textContent=avg.toFixed(1)+'s'; tw.style.display='';
  } else tw.style.display='none';
  var arc=document.getElementById('resArc'), C=2*Math.PI*68, off=C-(pct/100)*C;
  arc.style.transition='none'; arc.style.strokeDashoffset=C;
  setTimeout(function(){arc.style.transition='stroke-dashoffset 1s ease';arc.style.strokeDashoffset=off},80);
  if(pct>=90){arc.style.stroke='var(--correct)';document.getElementById('resTitle').textContent='M\u00fckemmel! \uD83C\uDF89';document.getElementById('resDesc').textContent='Kelime bilgin \u00e7ok g\u00fc\u00e7l\u00fc!';}
  else if(pct>=70){arc.style.stroke='var(--accent)';document.getElementById('resTitle').textContent='\u0130yi Gidiyorsun! \uD83D\uDCAA';document.getElementById('resDesc').textContent='Yanl\u0131\u015flar\u0131n\u0131 tekrar et, daha da ilerle.';}
  else if(pct>=50){arc.style.stroke='var(--gold)';document.getElementById('resTitle').textContent='Fena De\u011fil \uD83D\uDCDA';document.getElementById('resDesc').textContent='Pratik yapmaya devam et.';}
  else{arc.style.stroke='var(--wrong)';document.getElementById('resTitle').textContent='Daha \u00c7ok \u00c7al\u0131\u015f \uD83D\uDD01';document.getElementById('resDesc').textContent='Yanl\u0131\u015flar\u0131n\u0131 not al ve tekrar et.';}
  var ws=document.getElementById('wrongSec'),wl=document.getElementById('wrongList');
  if(wrongArr.length){ws.style.display='block';wl.innerHTML=wrongArr.map(function(w){return'<div class="ww-item"><span class="we">'+w.en+'</span><span class="wt">'+w.tr+'</span></div>'}).join('');}
  else ws.style.display='none';
  go('scrResult');
}

// ── KEYBOARD ──
document.addEventListener('keydown',function(e){
  // Quiz mode keys
  if(document.getElementById('scrQuiz').classList.contains('active')){
    var k=['1','2','3','4','a','b','c','d'],x=k.indexOf(e.key.toLowerCase());
    if(x!==-1){var b=document.querySelectorAll('.opt-btn:not(.dis)');if(b[x%4])b[x%4].click()}
    if(e.key==='Enter'){var n=document.getElementById('nxtBtn');if(n.classList.contains('live'))n.click()}
  }
  // Wordle mode keys
  if(document.getElementById('scrWordle').classList.contains('active')){
    if(e.key==='Enter'){
      if(document.getElementById('wNxt').classList.contains('live')) wordleNext();
      else if(!wDone) wordleGuess();
    }
  }
});

renderHome();
</script>
