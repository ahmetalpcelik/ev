<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>evim ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F5F0E8;--card:#FEFCF7;--ink:#1A1612;--muted:#8A7F74;--accent:#C4552A;--accent2:#3A6B4A;--border:rgba(26,22,18,0.1);--shadow:0 2px 20px rgba(26,22,18,0.07)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;padding:32px 24px 60px}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.6}
  .container{max-width:720px;margin:0 auto;position:relative;z-index:1}
  header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:40px;animation:fadeUp .6s ease both}
  .greeting h1{font-family:'Instrument Serif',serif;font-size:clamp(2rem,5vw,2.8rem);font-weight:400;line-height:1.1;letter-spacing:-.02em}
  .greeting h1 em{font-style:italic;color:var(--accent)}
  .greeting .date{font-size:.78rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:6px}
  .header-right{display:flex;align-items:center;gap:10px}
  .header-pill{background:var(--ink);color:var(--bg);border-radius:100px;padding:8px 16px;font-size:.75rem;letter-spacing:.06em;text-transform:uppercase;font-weight:500;white-space:nowrap}
  @keyframes spin{to{transform:rotate(360deg)}}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;animation:fadeUp .6s .1s ease both}
  .stat-card{background:var(--card);border-radius:16px;padding:20px 22px;border:1px solid var(--border);box-shadow:var(--shadow)}
  .stat-card .label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
  .stat-card .number{font-family:'Instrument Serif',serif;font-size:2.2rem;line-height:1;color:var(--ink)}
  .stat-card .sub{font-size:.78rem;color:var(--muted);margin-top:4px}
  .stat-card.accent-card{background:var(--accent);border-color:transparent}
  .stat-card.accent-card .label,.stat-card.accent-card .number,.stat-card.accent-card .sub{color:rgba(255,255,255,.9)}
  .card{background:var(--card);border-radius:20px;padding:24px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .card-title{font-family:'Instrument Serif',serif;font-size:1.25rem;font-weight:400}
  .card-tag{font-size:.7rem;padding:4px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
  .tag-green{background:#DCF0E3;color:var(--accent2)}.tag-orange{background:#FAE5DC;color:var(--accent)}.tag-blue{background:#DCE8F0;color:#2A5C7A}
  /* TODO */
  .todo-list{list-style:none}
  .todo-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .2s}
  .todo-item:last-child{border-bottom:none}
  .todo-item.done{opacity:.4}.todo-item.done .todo-text{text-decoration:line-through}
  .checkbox{width:20px;height:20px;border:1.5px solid var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:white}
  .todo-item.done .checkbox{background:var(--accent2);border-color:var(--accent2)}
  .checkmark{width:10px;height:10px;stroke:white;stroke-width:2.5;fill:none;opacity:0;transition:opacity .2s}
  .todo-item.done .checkmark{opacity:1}
  .todo-text{font-size:.9rem;flex:1}
  .delete-btn{width:24px;height:24px;border-radius:50%;border:none;background:transparent;color:var(--muted);font-size:1.2rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0;transition:opacity .15s,background .15s,color .15s}
  @media(hover:hover){.delete-btn{opacity:0}.todo-item:hover .delete-btn{opacity:1}.delete-btn:hover{background:#FAE5DC;color:var(--accent)}}
  @media(hover:none){.delete-btn{opacity:.4}}
  .add-row{display:flex;gap:8px;margin-top:16px}
  .add-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--ink);outline:none;transition:border-color .2s}
  .add-input:focus{border-color:var(--accent)}.add-input::placeholder{color:var(--muted)}
  .add-btn{background:var(--ink);color:var(--bg);border:none;border-radius:10px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:transform .15s,opacity .15s}
  .add-btn:hover{opacity:.8;transform:scale(.98)}
  .progress-wrap{margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
  .progress-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:8px}
  .progress-bar{height:4px;background:var(--border);border-radius:100px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent2);border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  /* CALENDAR */
  .cal-day:hover{background:var(--bg)}.cal-day.empty{cursor:default;pointer-events:none}
  .cal-day.today{background:var(--accent);color:white;font-weight:600}.cal-day.today:hover{background:var(--accent)}
  .cal-day.selected{background:var(--ink);color:white}.cal-day.selected:hover{background:var(--ink)}
  /* SHOPPING — kategoriler */
  .shop-categories{display:flex;flex-direction:column;gap:16px}
  .shop-cat{border-radius:12px;border:2px dashed transparent;transition:border-color .2s,background .2s;padding:4px}
  .shop-cat.drag-over{border-color:var(--accent2);background:rgba(58,107,74,0.05)}
  .shop-cat-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .shop-cat-name{font-size:.7rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:500;flex:1;padding:3px 6px;border-radius:6px;border:1px solid transparent;background:transparent;font-family:'DM Sans',sans-serif;cursor:text;outline:none;transition:border-color .2s,background .2s}
  .shop-cat-name:focus{border-color:var(--border);background:var(--bg);color:var(--ink)}
  .shop-cat-del{background:transparent;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:2px 4px;border-radius:4px;transition:color .15s,opacity .15s;opacity:0}
  .shop-cat-header:hover .shop-cat-del{opacity:1}
  .shop-cat-del:hover{color:var(--accent)}
  .shop-grid{display:flex;flex-wrap:wrap;gap:8px;min-height:28px}
  .shop-grid.drag-over{background:rgba(58,107,74,0.04);border-radius:8px}
  .shop-chip{display:flex;align-items:center;gap:5px;padding:6px 8px 6px 10px;border-radius:100px;border:1.5px solid var(--border);background:white;font-size:.82rem;cursor:grab;transition:all .2s;user-select:none;position:relative}
  .shop-chip:active{cursor:grabbing}
  .shop-chip:hover{border-color:var(--accent2)}
  .shop-chip.bought{background:#F0F0EC;border-color:transparent;opacity:.5;text-decoration:line-through}
  .shop-chip.dragging{opacity:.4;transform:scale(.95)}
  .shop-chip .qty{font-size:.7rem;color:var(--muted)}
  .chip-check{width:14px;height:14px;border:1.5px solid var(--border);border-radius:50%;flex-shrink:0;cursor:pointer;transition:all .2s;background:white;display:flex;align-items:center;justify-content:center}
  .shop-chip.bought .chip-check{background:var(--accent2);border-color:var(--accent2)}
  .chip-check-mark{width:7px;height:7px;stroke:white;stroke-width:2.5;fill:none;opacity:0;transition:opacity .15s}
  .shop-chip.bought .chip-check-mark{opacity:1}
  .chip-delete{width:16px;height:16px;border-radius:50%;border:none;background:transparent;color:var(--muted);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:opacity .15s,color .15s;line-height:1}
  @media(hover:hover){.chip-delete{opacity:0}.shop-chip:hover .chip-delete{opacity:1}.chip-delete:hover{color:var(--accent)}}
  @media(hover:none){.chip-delete{opacity:.4}}
  .shop-add-row{display:flex;gap:8px;margin-top:4px;align-items:center}
  .shop-add-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--ink);outline:none;transition:border-color .2s}
  .shop-add-input:focus{border-color:var(--accent)}.shop-add-input::placeholder{color:var(--muted)}
  .cat-select{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--ink);outline:none;cursor:pointer;transition:border-color .2s}
  .cat-select:focus{border-color:var(--accent)}
  .add-cat-row{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)}
  .add-cat-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--ink);outline:none;transition:border-color .2s}
  .add-cat-input:focus{border-color:var(--accent2)}.add-cat-input::placeholder{color:var(--muted)}
  .add-cat-btn{background:var(--accent2);color:white;border:none;border-radius:10px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap}
  .add-cat-btn:hover{opacity:.85}
  .empty-state{text-align:center;padding:20px 0 8px;color:var(--muted);font-size:.82rem}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .card:nth-child(1){animation:fadeUp .6s .1s ease both}
  .card:nth-child(2){animation:fadeUp .6s .2s ease both}
  .card:nth-child(3){animation:fadeUp .6s .3s ease both}
  footer{text-align:center;font-size:.72rem;color:var(--muted);margin-top:40px;letter-spacing:.05em}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="greeting">
      <h1>merhaba, <em>bugün</em><br>neler var?</h1>
      <p class="date" id="dateDisplay"></p>
    </div>
    <div class="header-right">
      <div class="header-pill">evim ✦</div>
    </div>
  </header>

  <div class="stats">
    <div class="stat-card accent-card">
      <div class="label">Tamamlanan</div>
      <div class="number" id="doneCount">0</div>
      <div class="sub">görev bugün</div>
    </div>
    <div class="stat-card">
      <div class="label">Kalan</div>

  <!-- GÖREVLER -->
  <div class="card">

    <ul class="todo-list" id="todoList"></ul>

      <div class="progress-label"><span>ilerleme</span><span id="progressPct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- TAKVİM -->
  <div class="card" style="padding:0;overflow:hidden">
    <div class="card-header" style="padding:20px 24px 16px">
      <h2 class="card-title">takvim</h2>
      <span class="card-tag tag-blue">google calendar</span>
    </div>
    <iframe
      src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=Europe%2FIstanbul&showPrint=0&src=YWxwLmNoZWxpa0BnbWFpbC5jb20&src=NDQ2MDJhY2Y3ODdhNDk5NDQyNjE3ZWE1ZDRiODk1ZmRmZDRiNGU0N2Q2OTg1M2Y3NWYyNDExOGY0ZTM5NTBhNkBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=NDI0YTM1MzQ2NzQzM2FmZTRlNTFlYTlhYzc0NzIzN2VkMTEzMmU2NGNhOWM4ODliNmJmNDJlNjIxYmY2YzRjOEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=ZGY5YWExYmY0MTdiZDQ4MjBlYmY3YzQ2NjVkZTUzNjcxYTkyYTNmNWUxYTllYzllYzlmNmUwYWUyMzMyNjdjN0Bncm91cC5jYWxlbmRhci5nb29nbGUuY29t&color=%23039be5&color=%23f6bf26&color=%237cb342&color=%23d81b60"
      style="border:none;width:100%;height:580px;display:block"
      frameborder="0"
      scrolling="no">
    </iframe>
  </div>

  <!-- ALIŞVERİŞ -->
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">alışveriş</h2>
      <span class="card-tag tag-green">market</span>

    <div class="shop-categories" id="shopCategories"></div>
    <div class="shop-add-row" style="margin-top:16px">
      <input class="shop-add-input" id="shopInput" placeholder="ürün ekle…" />
      <select class="cat-select" id="catSelect"></select>
      <button class="add-btn" onclick="addShopItem()">ekle</button>
    </div>
    <div class="add-cat-row">
      <input class="add-cat-input" id="newCatInput" placeholder="yeni kategori…" />
      <button class="add-cat-btn" onclick="addCategory()">+ kategori</button>
    </div>
  </div>
</div>

<footer>son güncelleme: az önce ✦</footer>
<script>
// ── CONFIG — JSONBin.io ────────────────────────────────
const BIN_ID  = '69a7526bae596e708f5c2c90';
const API_KEY = '$2a$10$qq80rttHtv2yy5PMTLhF6ujBNUWDSI3OMUkFQaeDUw3sUfJixgTk2';

// ── STATE ──────────────────────────────────────────────
const days=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const months=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const now=new Date();
document.getElementById('dateDisplay').textContent=`${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

const DEFAULT_CATS=[
  {id:'cat_1',name:'sebze & meyve',items:[]},
  {id:'cat_2',name:'temel',items:[]},
  {id:'cat_3',name:'diğer',items:[]}
];

let todos      = [];
let categories = JSON.parse(JSON.stringify(DEFAULT_CATS));
let dragItem   = null;

// ── JSONBIN SYNC ───────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { 'X-Access-Key': API_KEY }
    });
    if (!res.ok) throw new Error();
    const data = (await res.json()).record;
    todos      = data.todos      ?? [];
    categories = data.categories ?? JSON.parse(JSON.stringify(DEFAULT_CATS));
  } catch(e) {
    todos      = JSON.parse(localStorage.getItem('evim_todos') || '[]');
    categories = JSON.parse(localStorage.getItem('evim_cats') || 'null') ?? JSON.parse(JSON.stringify(DEFAULT_CATS));
  }
  renderTodayTodos();
  renderShop();
}

async function save() {
  const data = { todos, categories };
  localStorage.setItem('evim_todos', JSON.stringify(todos));
  localStorage.setItem('evim_cats',  JSON.stringify(categories));
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Access-Key': API_KEY },
      body: JSON.stringify(data)
    });
  } catch(e) {}
}

function saveTodos() { save(); }
function saveCats()  { save(); }

// Sekmeye geri dönünce taze veri çek
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') loadData();
});

// ── TODOS ─────────────────────────────────────────────
function renderTodayTodos(){
  const list=document.getElementById('todoList');list.innerHTML='';
  todos.forEach((t,i)=>{
    const li=document.createElement('li');li.className='todo-item'+(t.done?' done':'');
    li.innerHTML=`<div class="checkbox"><svg class="checkmark" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg></div><span class="todo-text">${t.text}</span><button class="delete-btn" title="sil">&#215;</button>`;
    li.querySelector('.delete-btn').addEventListener('click',e=>{e.stopPropagation();todos.splice(i,1);saveTodos();renderTodayTodos();});
    li.addEventListener('click',()=>{todos[i].done=!todos[i].done;saveTodos();renderTodayTodos();});
    list.appendChild(li);
  });
  if(!list.children.length)list.innerHTML='<div class="empty-state">bugün görev yok &#127881;</div>';
  updateStats();
}
function updateStats(){
  const done=todos.filter(t=>t.done).length,total=todos.length;
  document.getElementById('doneCount').textContent=done;
  document.getElementById('remainCount').textContent=total-done;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
}
function addTodo(){
  const input=document.getElementById('todoInput'),val=input.value.trim();
  if(!val)return;todos.unshift({text:val,done:false});saveTodos();input.value='';renderTodayTodos();
}
document.getElementById('todoInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTodo();});

// ── SHOPPING ──────────────────────────────────────────
function renderShop(){
  const container=document.getElementById('shopCategories');
  container.innerHTML='';

  categories.forEach(cat=>{
    const section=document.createElement('div');
    section.className='shop-cat';
    section.dataset.catId=cat.id;

    // Kategori başlık
    const header=document.createElement('div');
    header.className='shop-cat-header';

    const nameEl=document.createElement('input');
    nameEl.className='shop-cat-name';
    nameEl.value=cat.name;
    nameEl.spellcheck=false;
    nameEl.addEventListener('blur',()=>{cat.name=nameEl.value.trim()||cat.name;nameEl.value=cat.name;saveCats();updateCatSelect();});
    nameEl.addEventListener('keydown',e=>{if(e.key==='Enter')nameEl.blur();});

    const delBtn=document.createElement('button');
    delBtn.className='shop-cat-del';
    delBtn.title='kategoriyi sil';
    delBtn.innerHTML='&#215;';
    delBtn.onclick=()=>{
      if(cat.items.length>0&&!confirm(`"${cat.name}" kategorisindeki ${cat.items.length} ürün de silinecek. Devam?`))return;
      categories=categories.filter(c=>c.id!==cat.id);saveCats();
      renderShop();
    };

    header.appendChild(nameEl);
    header.appendChild(delBtn);

    // Chip grid — drop target
    const grid=document.createElement('div');
    grid.className='shop-grid';
    grid.dataset.catId=cat.id;

    // Drag over grid
    grid.addEventListener('dragover',e=>{e.preventDefault();grid.classList.add('drag-over');});
    grid.addEventListener('dragleave',()=>grid.classList.remove('drag-over'));
    grid.addEventListener('drop',e=>{
      e.preventDefault();grid.classList.remove('drag-over');
      if(!dragItem||dragItem.catId===cat.id)return;
      const fromCat=categories.find(c=>c.id===dragItem.catId);
      if(!fromCat)return;
      const [item]=fromCat.items.splice(dragItem.itemIdx,1);
      cat.items.push(item);saveCats();
      dragItem=null;
      renderShop();
    });

    cat.items.forEach((item,idx)=>{
      const chip=document.createElement('div');
      chip.className='shop-chip'+(item.bought?' bought':'');
      chip.draggable=true;
      chip.dataset.idx=idx;

      chip.innerHTML=`
        <div class="chip-check"><svg class="chip-check-mark" viewBox="0 0 8 8"><polyline points="1,4 3,6.5 7,1.5"/></svg></div>
        <span class="chip-name">${item.name}</span>
        ${item.qty?`<span class="qty">${item.qty}</span>`:''}
        <button class="chip-delete" title="sil">&#215;</button>
      `;

      // Toggle bought — click on chip (not buttons)
      chip.addEventListener('click',e=>{
        if(e.target.closest('.chip-delete')||e.target.closest('.chip-check'))return;
        item.bought=!item.bought;saveCats();renderShop();
      });

      // Toggle via check circle
      chip.querySelector('.chip-check').addEventListener('click',e=>{
        e.stopPropagation();item.bought=!item.bought;saveCats();renderShop();
      });

      // Delete
      chip.querySelector('.chip-delete').addEventListener('click',e=>{
        e.stopPropagation();cat.items.splice(idx,1);saveCats();renderShop();
      });

      // Drag
      chip.addEventListener('dragstart',e=>{
        dragItem={catId:cat.id,itemIdx:idx};
        chip.classList.add('dragging');
        e.dataTransfer.effectAllowed='move';
      });
      chip.addEventListener('dragend',()=>{chip.classList.remove('dragging');dragItem=null;});

      grid.appendChild(chip);
    });

    section.appendChild(header);
    section.appendChild(grid);

    // Section drop (for empty categories)
    section.addEventListener('dragover',e=>{e.preventDefault();section.classList.add('drag-over');});
    section.addEventListener('dragleave',e=>{if(!section.contains(e.relatedTarget))section.classList.remove('drag-over');});
    section.addEventListener('drop',e=>{
      e.preventDefault();section.classList.remove('drag-over');
      if(!dragItem||dragItem.catId===cat.id)return;
      const fromCat=categories.find(c=>c.id===dragItem.catId);
      if(!fromCat)return;
      const [item]=fromCat.items.splice(dragItem.itemIdx,1);
      cat.items.push(item);saveCats();
      dragItem=null;renderShop();
    });

    container.appendChild(section);
  });

  updateCatSelect();
}

function updateCatSelect(){
  const sel=document.getElementById('catSelect');
  sel.innerHTML='';
  categories.forEach(cat=>{
    const opt=document.createElement('option');
    opt.value=cat.id;opt.textContent=cat.name;
    sel.appendChild(opt);
  });
}

function addShopItem(){
  const input=document.getElementById('shopInput');
  const val=input.value.trim();if(!val)return;
  const catId=document.getElementById('catSelect').value;
  const cat=categories.find(c=>c.id===catId);
  if(cat){cat.items.push({name:val,qty:'',bought:false});saveCats();}
  input.value='';renderShop();
}

function addCategory(){
  const input=document.getElementById('newCatInput');
  const val=input.value.trim();if(!val)return;
  categories.push({id:'cat_'+Date.now(),name:val,items:[]});saveCats();
  input.value='';renderShop();
}

document.getElementById('shopInput').addEventListener('keydown',e=>{if(e.key==='Enter')addShopItem();});
document.getElementById('newCatInput').addEventListener('keydown',e=>{if(e.key==='Enter')addCategory();});

// ── INIT ──────────────────────────────────────────────
loadData();
</script>
</body>
</html>
